
services:
  app:
    build: .
    container_name: app
    ports:
      - "80:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/appdb
      - PORT=3000
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: mongo
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-net
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  app-net:
    driver: bridge
