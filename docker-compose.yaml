
version: "3.8"
services:
  app:
    build: .
    container_name: app
    ports:
      - "80:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/appdb
    depends_on:
      - mongo
    networks:
      - app-net
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: mongo
    volumes:
      - mongo-data:/data/db
    networks:
      - app-net
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  app-net:
    driver: bridge